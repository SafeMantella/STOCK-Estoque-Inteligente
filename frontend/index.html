<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock :: Acesso</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>
<body>
  <br><br>
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-4 text-center">
        <img style="width:100%;" src="carrinho.png" alt="Carrinho">
      </div>
      <div class="col-md-4">
        <h3>Entre no nosso sistema!<br>Bem-vindo ao STOCK!</h3><br>
        <div id="msg-area"></div>
        <form id="form-login">
          <div class="mb-3">
            <label class="form-label">Email:</label>
            <input type="email" name="email" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Senha:</label>
            <input type="password" name="senha" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-stock">Acessar</button>
        </form>
        <br>
        <button class="btn btn-outline-success w-100" onclick="window.location.href='pages/cadastroUsuario.html'">Cadastre-se</button>
      </div>
      <div class="col-md-4 text-center">
        <img style="width:100%;" src="carrinho.png" alt="Carrinho">
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    redirectIfLoggedIn();

    document.getElementById('form-login').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = this.email.value;
      const senha = this.senha.value;
      try {
        const data = await apiCall('POST', '/auth/login', { email, senha });
        localStorage.setItem('token',       data.access_token);
        localStorage.setItem('nome',        data.nome);
        localStorage.setItem('permissao',   data.permissao);
        localStorage.setItem('cod_estoque', data.cod_estoque);
        localStorage.setItem('cod_usuario', data.cod_usuario);
        window.location.href = 'menu.html';
      } catch (err) {
        showMsg(err.message);
      }
    });
  </script>
</body>
</html>
