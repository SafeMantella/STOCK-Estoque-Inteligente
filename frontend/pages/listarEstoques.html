<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock :: Listar Estoques</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/custom.css" rel="stylesheet">
</head>
<body>
  <br><br>
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-1"></div>
      <div class="col-md-10">
        <button class="btn btn-outline-success mb-3" onclick="window.location.href='../menu.html'">Voltar ao Menu</button>
        <div id="msg-area"></div>
        <div class="table-responsive">
          <table class="table table-hover">
            <thead>
              <tr class="table-active">
                <th>ID Estoque</th><th>Descrição</th>
              </tr>
            </thead>
            <tbody id="tabela-estoques"></tbody>
          </table>
        </div>
      </div>
      <div class="col-md-1"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    requireAuth();

    async function carregarEstoques() {
      try {
        const estoques = await apiCall('GET', '/estoque');
        const tbody = document.getElementById('tabela-estoques');
        tbody.innerHTML = '';
        estoques.forEach(e => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${e.cod_estoque}</td><td>${e.descricao}</td>`;
          tbody.appendChild(tr);
        });
      } catch (err) {
        showMsg(err.message);
      }
    }

    carregarEstoques();
  </script>
</body>
</html>
