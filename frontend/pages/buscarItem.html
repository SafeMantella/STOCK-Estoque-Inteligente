<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock :: Buscar Itens</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/custom.css" rel="stylesheet">
</head>
<body>
  <br><br>
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-4"></div>
      <div class="col-md-4">
        <button class="btn btn-outline-success w-100 mb-2" onclick="window.location.href='../menu.html'">Voltar ao Menu</button>
        <div id="msg-area"></div>
        <form id="form-busca">
          <div class="mb-2">
            <label class="form-label">Cod. Item:</label>
            <input type="number" name="cod_item" class="form-control">
          </div>
          <div class="mb-2">
            <label class="form-label">Descrição:</label>
            <input type="text" name="descricao" class="form-control">
          </div>
          <div class="mb-2">
            <label class="form-label">Categoria:</label>
            <select name="categoria" class="form-select">
              <option value="">Todas</option>
              <option>Higiene e Limpeza</option>
              <option>Bebidas</option>
              <option>Adega</option>
              <option>Molhos e Óleos</option>
              <option>Açúcares e Doces</option>
              <option>Laticínios</option>
              <option>Carnes e Ovos</option>
              <option>Leguminosas/Hortaliças/Raízes/Tubérculos</option>
              <option>Frutas</option>
              <option>Cereais e Mel</option>
              <option>Pão e Massas</option>
              <option>Outros</option>
            </select>
          </div>
          <br>
          <button type="submit" class="btn btn-stock w-100">Buscar</button>
        </form>
      </div>
      <div class="col-md-4"></div>
    </div>

    <!-- Resultados -->
    <div class="row mt-4" id="resultado-section" style="display:none;">
      <div class="col-md-1"></div>
      <div class="col-md-10">
        <button class="btn btn-outline-success mb-2 me-2" onclick="window.location.href='listarItens.html'">Todos os Itens</button>
        <button class="btn btn-outline-success mb-2" onclick="document.getElementById('resultado-section').style.display='none'">Buscar Novamente</button>
        <p id="contagem"></p>
        <div class="table-responsive">
          <table class="table table-hover">
            <thead>
              <tr class="table-active">
                <th>ID Item</th><th>Descrição</th><th>Categoria</th>
                <th>Mínimo Desejado</th><th>Disponível em Estoque</th><th>Adicionar ao Estoque</th>
              </tr>
            </thead>
            <tbody id="tabela-resultado"></tbody>
          </table>
        </div>
      </div>
      <div class="col-md-1"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    requireAuth();

    document.getElementById('form-busca').addEventListener('submit', async function(e) {
      e.preventDefault();
      const params = new URLSearchParams();
      if (this.cod_item.value)  params.set('cod_item',   this.cod_item.value);
      if (this.descricao.value) params.set('descricao',  this.descricao.value);
      if (this.categoria.value) params.set('categoria',  this.categoria.value);
      try {
        const itens = await apiCall('GET', '/items?' + params);
        document.getElementById('contagem').textContent = itens.length + ' item(s) encontrado(s).';
        const tbody = document.getElementById('tabela-resultado');
        tbody.innerHTML = '';
        itens.forEach(item => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${item.cod_item}</td><td>${item.descricao}</td><td>${item.categoria}</td>
            <td><input type="number" class="qtd-desejada" min="1" placeholder="Mínimo"></td>
            <td><input type="number" class="qtd-estoque" min="0" placeholder="Atual"></td>
            <td><button class="btn btn-sm btn-outline-success" onclick="adicionarItem(${item.cod_item}, this)">Adicionar</button></td>
          `;
          tbody.appendChild(tr);
        });
        document.getElementById('resultado-section').style.display = 'block';
      } catch (err) {
        showMsg(err.message);
      }
    });

    async function adicionarItem(cod_item, btn) {
      const tr = btn.closest('tr');
      const qtd_desejada = parseInt(tr.querySelector('.qtd-desejada').value);
      const qtd_estoque  = parseInt(tr.querySelector('.qtd-estoque').value);
      if (!qtd_desejada || qtd_desejada <= 0) { showMsg('Preencha MÍNIMO DESEJADO corretamente!'); return; }
      if (isNaN(qtd_estoque) || qtd_estoque < 0) { showMsg('Preencha DISPONÍVEL EM ESTOQUE corretamente!'); return; }
      try {
        await apiCall('POST', '/stock', { cod_item, qtd_desejada, qtd_estoque });
        showMsg('Adicionado com Sucesso!', 'success');
      } catch (err) {
        showMsg(err.message);
      }
    }
  </script>
</body>
</html>
