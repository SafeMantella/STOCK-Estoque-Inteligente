<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock :: SAC / Contato</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/custom.css" rel="stylesheet">
</head>
<body>
  <br><br>
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-4"></div>
      <div class="col-md-4">
        <button class="btn btn-outline-success w-100 mb-3" onclick="window.location.href='../menu.html'">Voltar ao Menu</button>

        <h4 class="text-center">SAC - Serviço de Atendimento ao Cliente</h4><br>

        <div id="msg-area"></div>

        <form id="form-contato">
          <div class="mb-2">
            <label class="form-label">Seu nome:</label>
            <input type="text" name="nome" class="form-control" required>
          </div>
          <div class="mb-2">
            <label class="form-label">Seu email:</label>
            <input type="email" name="email" class="form-control" required>
          </div>
          <div class="mb-2">
            <label class="form-label">Assunto:</label>
            <select name="assunto" class="form-select" required>
              <option value="">Selecione...</option>
              <option value="sugestao">Sugestão</option>
              <option value="erro">Relatório de Erro</option>
              <option value="duvida">Dúvida</option>
              <option value="outro">Outro</option>
            </select>
          </div>
          <div class="mb-2">
            <label class="form-label">Mensagem:</label>
            <textarea name="mensagem" class="form-control" rows="4" required></textarea>
          </div>
          <br>
          <button type="submit" class="btn btn-stock w-100">Enviar</button>
        </form>
      </div>
      <div class="col-md-4"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    document.getElementById('form-contato').addEventListener('submit', function(e) {
      e.preventDefault();
      showMsg('Mensagem enviada! Em breve entraremos em contato.', 'success');
      this.reset();
    });
  </script>
</body>
</html>
