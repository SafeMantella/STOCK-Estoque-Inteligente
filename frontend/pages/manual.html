<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock :: Manual do Usuário</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/custom.css" rel="stylesheet">
</head>
<body>
  <br><br>
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-4"></div>
      <div class="col-md-4">

        <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
          onclick="window.location.href='../menu.html'">Voltar ao Menu</button>
        <label>Retorna ao Menu Principal.</label><br><br>

        <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
          onclick="window.location.href='usuarios.html'">Usuários em seu estoque</button>
        <label>Aqui você pode verificar os usuários cadastrados em seu estoque.</label><br><br>

        <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
          onclick="window.location.href='listarItens.html'">Listar Itens</button>
        <label>Aqui você possui acesso a todos os itens já cadastrados no sistema, podendo adicioná-los ao seu estoque pessoal.</label><br><br>

        <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
          onclick="window.location.href='buscarItem.html'">Buscar Itens</button>
        <label>Caso haja alguma dificuldade em encontrar algum item na página acima, você pode buscar por ele aqui.</label><br><br>

        <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
          onclick="window.location.href='estoque.html'">Meu Estoque</button>
        <label>Aqui você tem acesso aos itens que você cadastrou em seu estoque pessoal.</label><br><br>

        <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
          onclick="window.location.href='listaCompras.html'">Lista de Compras</button>
        <label>Aqui são reunidos todos os seus itens cuja a quantidade disponível em sua casa é menor do que a quantidade que você deseja.</label><br><br>

        <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
          onclick="window.location.href='contato.html'">SAC</button>
        <label>Utilize esta página para nos enviar um comentário, relatório de erro ou sugestão para melhorarmos o site.</label><br><br>

        <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
          onclick="window.location.href='quemSomos.html'">Quem Somos?</button>
        <label>Uma breve apresentação da equipe de desenvolvimento do STOCK.</label><br><br>

      </div>
      <div class="col-md-4"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
