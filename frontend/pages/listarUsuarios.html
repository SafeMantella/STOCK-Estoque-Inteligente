<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock :: Listar Usuários</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/custom.css" rel="stylesheet">
</head>
<body>
  <br><br>
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-1"></div>
      <div class="col-md-10">
        <button class="btn btn-outline-success mb-3" onclick="window.location.href='../menu.html'">Voltar ao Menu</button>
        <div id="msg-area"></div>
        <p id="contagem"></p>
        <div class="table-responsive">
          <table class="table table-hover">
            <thead>
              <tr class="table-active">
                <th>ID Usuário</th><th>Nome</th><th>Email</th><th>Permissão</th><th>ID Estoque</th>
              </tr>
            </thead>
            <tbody id="tabela-usuarios"></tbody>
          </table>
        </div>
      </div>
      <div class="col-md-1"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    requireAuth();

    async function carregarUsuarios() {
      try {
        const users = await apiCall('GET', '/users');
        document.getElementById('contagem').textContent = users.length + ' usuário(s) encontrado(s).';
        const tbody = document.getElementById('tabela-usuarios');
        tbody.innerHTML = '';
        users.forEach(u => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${u.cod_usuario}</td><td>${u.nome}</td><td>${u.email}</td><td>${u.permissao}</td><td>${u.cod_estoque}</td>`;
          tbody.appendChild(tr);
        });
      } catch (err) {
        showMsg(err.message);
      }
    }

    carregarUsuarios();
  </script>
</body>
</html>
