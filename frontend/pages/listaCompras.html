<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock :: Lista de Compras</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/custom.css" rel="stylesheet">
</head>
<body>
  <br><br>
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-1"></div>
      <div class="col-md-10">
        <button class="btn btn-outline-success mb-2 me-2" onclick="window.location.href='../menu.html'">Voltar ao Menu</button>
        <button class="btn btn-outline-success mb-2" onclick="carregarLista()">Gerar Lista</button>
        <div id="msg-area" class="mt-2"></div>
        <p id="contagem" class="mt-2"></p>
        <div class="table-responsive">
          <table class="table table-hover" id="tabela-lista" style="display:none;">
            <thead>
              <tr class="table-active">
                <th>ID Item</th>
                <th>Item</th>
                <th>Categoria</th>
                <th>Mínimo Desejado</th>
                <th>Disponível em Estoque</th>
                <th>Qtd. a Comprar</th>
                <th>Comprar</th>
              </tr>
            </thead>
            <tbody id="tabela-body"></tbody>
          </table>
        </div>
      </div>
      <div class="col-md-1"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    requireAuth();

    async function carregarLista() {
      try {
        const itens = await apiCall('GET', '/lista');
        const tabela = document.getElementById('tabela-lista');
        const tbody  = document.getElementById('tabela-body');
        document.getElementById('contagem').textContent = itens.length + ' item(s) abaixo do mínimo.';
        tbody.innerHTML = '';
        if (itens.length === 0) {
          tabela.style.display = 'none';
          showMsg('Estoque em dia! Nenhum item abaixo do mínimo.', 'success');
          return;
        }
        itens.forEach(item => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${item.cod_item}</td>
            <td>${item.descricao}</td>
            <td>${item.categoria}</td>
            <td>${item.qtd_desejada}</td>
            <td><input type="number" class="qtd-estoque-ro" value="${item.qtd_estoque}" readonly style="width:80px;"></td>
            <td><input type="number" class="qtd-comprar" value="${item.qtd_a_comprar}" min="1" style="width:80px;"></td>
            <td><button class="btn btn-sm btn-outline-success" onclick="registrarCompra(${item.cod_item}, this)">Comprar</button></td>
          `;
          tbody.appendChild(tr);
        });
        tabela.style.display = 'table';
      } catch (err) {
        showMsg(err.message);
      }
    }

    async function registrarCompra(cod_item, btn) {
      const tr = btn.closest('tr');
      const qtd_comprada = parseInt(tr.querySelector('.qtd-comprar').value);
      if (!qtd_comprada || qtd_comprada <= 0) { showMsg('Preencha a quantidade a comprar corretamente!'); return; }
      try {
        await apiCall('POST', '/lista/comprar', { cod_item, qtd_comprada });
        showMsg('Comprado com Sucesso!', 'success');
        setTimeout(carregarLista, 800);
      } catch (err) {
        showMsg(err.message);
      }
    }

    carregarLista();
  </script>
</body>
</html>
