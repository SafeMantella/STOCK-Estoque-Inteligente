<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock :: Cadastro de Dispensa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/custom.css" rel="stylesheet">
</head>
<body>
  <br><br>
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-4"></div>
      <div class="col-md-4">
        <button class="btn btn-outline-success w-100 mb-3" onclick="window.location.href='../menu.html'">Voltar ao Menu</button>
        <div id="msg-area"></div>
        <form id="form-dispensa">
          <div class="mb-2">
            <label class="form-label">Descrição do Estoque:</label>
            <input type="text" name="descricao" class="form-control" placeholder="nome do dono do estoque" required>
          </div>
          <br>
          <button type="submit" class="btn btn-stock w-100">Cadastrar Estoque</button>
        </form>
      </div>
      <div class="col-md-4"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    requireAuth();
    document.getElementById('form-dispensa').addEventListener('submit', async function(e) {
      e.preventDefault();
      try {
        await apiCall('POST', '/estoque', { descricao: this.descricao.value });
        showMsg('Cadastro feito com sucesso!', 'success');
        setTimeout(() => window.location.href = '../menu.html', 1200);
      } catch (err) {
        showMsg(err.message);
      }
    });
  </script>
</body>
</html>
