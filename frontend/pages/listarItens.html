<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock :: Listar Itens</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/custom.css" rel="stylesheet">
</head>
<body>
  <br><br>
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-1"></div>
      <div class="col-md-10">
        <button class="btn btn-outline-success mb-2 me-2" onclick="window.location.href='../menu.html'">Voltar ao Menu</button>
        <button class="btn btn-outline-success mb-2" onclick="window.location.href='buscarItem.html'">Buscar Itens</button>
        <br><br>
        <div id="msg-area"></div>
        <p id="contagem"></p>
        <div class="table-responsive">
          <table class="table table-hover">
            <thead>
              <tr class="table-active">
                <th>ID Item</th>
                <th>Descrição</th>
                <th>Categoria</th>
                <th>Mínimo Desejado</th>
                <th>Disponível em Estoque</th>
                <th>Adicionar ao Estoque</th>
              </tr>
            </thead>
            <tbody id="tabela-itens"></tbody>
          </table>
        </div>
      </div>
      <div class="col-md-1"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    requireAuth();

    async function carregarItens() {
      try {
        const itens = await apiCall('GET', '/items');
        document.getElementById('contagem').textContent = itens.length + ' item(s) encontrado(s).';
        const tbody = document.getElementById('tabela-itens');
        tbody.innerHTML = '';
        itens.forEach(item => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${item.cod_item}</td>
            <td>${item.descricao}</td>
            <td>${item.categoria}</td>
            <td><input type="number" class="qtd-desejada" min="1" placeholder="Mínimo"></td>
            <td><input type="number" class="qtd-estoque" min="0" placeholder="Atual"></td>
            <td><button class="btn btn-sm btn-outline-success" onclick="adicionarItem(${item.cod_item}, this)">Adicionar</button></td>
          `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        showMsg(err.message);
      }
    }

    async function adicionarItem(cod_item, btn) {
      const tr = btn.closest('tr');
      const qtd_desejada = parseInt(tr.querySelector('.qtd-desejada').value);
      const qtd_estoque  = parseInt(tr.querySelector('.qtd-estoque').value);
      if (!qtd_desejada || qtd_desejada <= 0) { showMsg('Preencha MÍNIMO DESEJADO corretamente!'); return; }
      if (isNaN(qtd_estoque) || qtd_estoque < 0) { showMsg('Preencha DISPONÍVEL EM ESTOQUE corretamente!'); return; }
      try {
        await apiCall('POST', '/stock', { cod_item, qtd_desejada, qtd_estoque });
        showMsg('Adicionado com Sucesso!', 'success');
      } catch (err) {
        showMsg(err.message);
      }
    }

    carregarItens();
  </script>
</body>
</html>
