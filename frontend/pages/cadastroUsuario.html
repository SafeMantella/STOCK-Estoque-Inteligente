<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock :: Cadastro de Usuário</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/custom.css" rel="stylesheet">
</head>
<body>
  <br><br>
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-4"></div>
      <div class="col-md-4">
        <button class="btn btn-outline-success w-100 mb-3" onclick="window.location.href='../menu.html'">Voltar ao Menu</button>

        <div id="msg-area"></div>

        <form id="form-cadastro">
          <div class="mb-2">
            <label class="form-label">Nome:</label>
            <input type="text" name="nome" class="form-control" required>
          </div>
          <div class="mb-2">
            <label class="form-label">Email:</label>
            <input type="email" name="email" class="form-control" required>
          </div>
          <div class="mb-2">
            <label class="form-label">Senha: <small>(mínimo 9 caracteres)</small></label>
            <input type="password" name="senha" class="form-control" minlength="9" required>
          </div>
          <div class="mb-2">
            <label class="form-label">Confirmar Senha:</label>
            <input type="password" name="confirmarSenha" class="form-control" minlength="9" required>
          </div>
          <div class="mb-2">
            <label class="form-label">Permissão:</label>
            <select name="permissao" class="form-select" required>
              <option value="usuario">usuario</option>
              <option value="admin">admin</option>
            </select>
          </div>
          <div class="mb-2">
            <label class="form-label">Código do Estoque:</label>
            <input type="number" name="cod_estoque" class="form-control" placeholder="Deixe vazio para criar novo">
          </div>
          <div class="mb-2" id="div-descricao-estoque">
            <label class="form-label">Nome do novo estoque (se não informou código acima):</label>
            <input type="text" name="descricao_estoque" class="form-control">
          </div>
          <br>
          <button type="submit" class="btn btn-stock w-100">Cadastrar</button>
        </form>
      </div>
      <div class="col-md-4"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    document.getElementById('form-cadastro').addEventListener('submit', async function(e) {
      e.preventDefault();
      const nome = this.nome.value;
      const email = this.email.value;
      const senha = this.senha.value;
      const confirmarSenha = this.confirmarSenha.value;
      const permissao = this.permissao.value;
      const cod_estoque = this.cod_estoque.value ? parseInt(this.cod_estoque.value) : null;
      const descricao_estoque = this.descricao_estoque.value || null;

      if (senha !== confirmarSenha) {
        showMsg('Senhas não correspondem.');
        return;
      }
      try {
        await apiCall('POST', '/users', { nome, email, senha, permissao, cod_estoque, descricao_estoque });
        showMsg('Cadastro feito com sucesso!', 'success');
        setTimeout(() => window.location.href = '../menu.html', 1200);
      } catch (err) {
        showMsg(err.message);
      }
    });
  </script>
</body>
</html>
