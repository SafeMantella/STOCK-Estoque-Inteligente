<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock :: Meu Estoque</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/custom.css" rel="stylesheet">
</head>
<body>
  <br><br>
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-1"></div>
      <div class="col-md-10">
        <button class="btn btn-outline-success mb-3" onclick="window.location.href='../menu.html'">Voltar ao Menu</button>
        <div id="msg-area"></div>
        <p id="contagem"></p>
        <div class="table-responsive">
          <table class="table table-hover">
            <thead>
              <tr class="table-active">
                <th>ID Item</th>
                <th>Descrição</th>
                <th>Categoria</th>
                <th>Mínimo Desejado</th>
                <th>Disponível em Estoque</th>
                <th>ID Estoque</th>
                <th>Atualizar</th>
              </tr>
            </thead>
            <tbody id="tabela-estoque"></tbody>
          </table>
        </div>
      </div>
      <div class="col-md-1"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    requireAuth();
    const user = getUser();

    async function carregarEstoque() {
      try {
        const itens = await apiCall('GET', '/stock');
        document.getElementById('contagem').textContent = itens.length + ' item(s) encontrado(s).';
        const tbody = document.getElementById('tabela-estoque');
        tbody.innerHTML = '';
        itens.forEach(item => {
          const tr = document.createElement('tr');

          [item.cod_item, item.descricao, item.categoria].forEach(val => {
            const td = document.createElement('td');
            td.textContent = val ?? '';
            tr.appendChild(td);
          });

          const tdDesejada = document.createElement('td');
          const inputDesejada = document.createElement('input');
          inputDesejada.type = 'number';
          inputDesejada.className = 'qtd-desejada';
          inputDesejada.value = item.qtd_desejada;
          inputDesejada.min = '0';
          tdDesejada.appendChild(inputDesejada);
          tr.appendChild(tdDesejada);

          const tdEstoque = document.createElement('td');
          const inputEstoque = document.createElement('input');
          inputEstoque.type = 'number';
          inputEstoque.className = 'qtd-estoque';
          inputEstoque.value = item.qtd_estoque;
          inputEstoque.min = '0';
          tdEstoque.appendChild(inputEstoque);
          tr.appendChild(tdEstoque);

          const tdCodEstoque = document.createElement('td');
          tdCodEstoque.textContent = item.cod_estoque ?? '';
          tr.appendChild(tdCodEstoque);

          const tdBtn = document.createElement('td');
          const btn = document.createElement('button');
          btn.className = 'btn btn-sm btn-outline-success';
          btn.textContent = 'Atualizar';
          btn.addEventListener('click', () => atualizarItem(item.cod_item, btn));
          tdBtn.appendChild(btn);
          tr.appendChild(tdBtn);

          tbody.appendChild(tr);
        });
      } catch (err) {
        showMsg(err.message);
      }
    }

    async function atualizarItem(cod_item, btn) {
      const tr = btn.closest('tr');
      const qtd_desejada = parseInt(tr.querySelector('.qtd-desejada').value);
      const qtd_estoque  = parseInt(tr.querySelector('.qtd-estoque').value);
      if (isNaN(qtd_desejada) || qtd_desejada < 0) { showMsg('Preencha MÍNIMO DESEJADO corretamente!'); return; }
      if (isNaN(qtd_estoque)  || qtd_estoque  < 0) { showMsg('Preencha DISPONÍVEL EM ESTOQUE corretamente!'); return; }
      try {
        await apiCall('PUT', '/stock/' + cod_item, { qtd_desejada, qtd_estoque });
        showMsg('Atualizado com Sucesso!', 'success');
      } catch (err) {
        showMsg(err.message);
      }
    }

    carregarEstoque();
  </script>
</body>
</html>
