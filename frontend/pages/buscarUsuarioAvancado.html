<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock :: Busca Avançada de Usuários</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/custom.css" rel="stylesheet">
</head>
<body>
  <br><br>
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-4"></div>
      <div class="col-md-4">
        <button class="btn btn-outline-success w-100 mb-2" onclick="window.location.href='../menu.html'">Voltar ao Menu</button>
        <button class="btn btn-outline-success w-100 mb-3" onclick="window.location.href='buscarUsuario.html'">Busca Simples</button>
        <div id="msg-area"></div>
        <form id="form-busca">
          <div class="mb-2">
            <label class="form-label">Nome:</label>
            <input type="text" name="nome" class="form-control">
          </div>
          <div class="mb-2">
            <label class="form-label">Email:</label>
            <input type="email" name="email" class="form-control">
          </div>
          <div class="mb-2">
            <label class="form-label">Permissão:</label>
            <select name="permissao" class="form-select">
              <option value="">Todas</option>
              <option value="usuario">usuario</option>
              <option value="admin">admin</option>
            </select>
          </div>
          <div class="mb-2">
            <label class="form-label">Código do Usuário:</label>
            <input type="number" name="cod_usuario" class="form-control">
          </div>
          <div class="mb-2">
            <label class="form-label">Código do Estoque:</label>
            <input type="number" name="cod_estoque" class="form-control">
          </div>
          <br>
          <button type="submit" class="btn btn-stock w-100">Buscar</button>
        </form>
      </div>
      <div class="col-md-4"></div>
    </div>

    <div class="row mt-4" id="resultado-section" style="display:none;">
      <div class="col-md-1"></div>
      <div class="col-md-10">
        <p id="contagem"></p>
        <div class="table-responsive">
          <table class="table table-hover">
            <thead>
              <tr class="table-active">
                <th>Nome</th><th>Email</th><th>Permissão</th><th>ID Usuário</th><th>ID Estoque</th>
              </tr>
            </thead>
            <tbody id="tabela-resultado"></tbody>
          </table>
        </div>
      </div>
      <div class="col-md-1"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    requireAuth();

    document.getElementById('form-busca').addEventListener('submit', async function(e) {
      e.preventDefault();
      const params = new URLSearchParams();
      if (this.nome.value)       params.set('nome',        this.nome.value);
      if (this.email.value)      params.set('email',       this.email.value);
      if (this.permissao.value)  params.set('permissao',   this.permissao.value);
      if (this.cod_usuario.value) params.set('cod_usuario', this.cod_usuario.value);
      if (this.cod_estoque.value) params.set('cod_estoque', this.cod_estoque.value);
      try {
        const users = await apiCall('GET', '/users?' + params);
        document.getElementById('contagem').textContent = users.length + ' usuário(s) encontrado(s).';
        const tbody = document.getElementById('tabela-resultado');
        tbody.innerHTML = '';
        users.forEach(u => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${u.nome}</td><td>${u.email}</td><td>${u.permissao}</td><td>${u.cod_usuario}</td><td>${u.cod_estoque}</td>`;
          tbody.appendChild(tr);
        });
        document.getElementById('resultado-section').style.display = 'block';
      } catch (err) {
        showMsg(err.message);
      }
    });
  </script>
</body>
</html>
