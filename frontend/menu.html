<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock :: Menu Principal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>
<body>
  <br><br>
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-4"></div>
      <div class="col-md-4">
        <h3 id="saudacao"></h3><br>
        <h3>Bem vindo ao sistema Stock!</h3><br>
        <label id="label-estoque"></label><br><br>

        <!-- Botões comuns -->
        <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
          onclick="window.location.href='pages/usuarios.html'">
          <img style="width:30px;float:left;" src="lista.jpg" alt=""> Usuários em seu estoque
        </button>
        <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
          onclick="window.location.href='pages/listarItens.html'">
          <img style="width:30px;float:left;" src="lista.jpg" alt=""> Listar Itens
        </button>
        <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
          onclick="window.location.href='pages/buscarItem.html'">
          <img style="width:30px;float:left;" src="buscar.jpg" alt=""> Buscar Itens
        </button>
        <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
          onclick="window.location.href='pages/estoque.html'">
          <img style="width:30px;float:left;" src="adc.jpg" alt=""> Meu Estoque
        </button>
        <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
          onclick="window.location.href='pages/listaCompras.html'">
          <img style="width:30px;float:left;" src="listacomp.jpg" alt=""> Lista de Compras
        </button>
        <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
          onclick="window.location.href='pages/quemSomos.html'">
          <img style="width:30px;height:30px;float:left;" src="qmsomos.jpg" alt=""> Quem Somos?
        </button>
        <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
          onclick="window.location.href='pages/manual.html'">
          Como o sistema funciona?
        </button>

        <!-- Seção admin -->
        <div id="admin-section" style="display:none;">
          <br>
          <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
            onclick="window.location.href='pages/cadastroDispensa.html'">
            Cadastrar Estoque - DEV
          </button>
          <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
            onclick="window.location.href='pages/listarEstoques.html'">
            Listar Estoques - DEV
          </button>
          <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
            onclick="window.location.href='pages/cadastroItem.html'">
            Cadastrar Novo Item - DEV
          </button>
          <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
            onclick="window.location.href='pages/cadastroUsuario.html'">
            Cadastrar Usuários - DEV
          </button>
          <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
            onclick="window.location.href='pages/listarUsuarios.html'">
            Listar Usuários - DEV
          </button>
          <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
            onclick="window.location.href='pages/buscarUsuario.html'">
            Buscar Usuários - DEV
          </button>
          <br>
          <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
            onclick="window.location.href='pages/contato.html'">
            SAC
          </button>
          <br>
        </div>

        <button type="button" class="btn btn-block btn-lg btn-outline-success w-100 mb-2"
          onclick="logout()">
          <img style="width:30px;float:left;" src="sair.jpg" alt=""> Sair
        </button>
      </div>
      <div class="col-md-4"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    requireAuth();
    const user = getUser();
    document.getElementById('saudacao').textContent = 'Olá ' + user.nome + '!';
    document.getElementById('label-estoque').textContent = 'Código de seu estoque: ' + user.cod_estoque;
    if (isAdmin()) {
      document.getElementById('admin-section').style.display = 'block';
    }
  </script>
</body>
</html>
